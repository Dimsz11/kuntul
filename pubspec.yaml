name: cms2026_mobile
description: >-
  CMS2026 reference Flutter app — a fully CMS-driven mobile client. The menu,
  home-page sections and branding are all controlled by the webmaster from the
  CMS2026 admin (Mobile App Builder) and rendered at runtime from the documented
  mobile contract (GET /api/mobile/menu, GET /api/mobile/home-layout, ...).
publish_to: "none"
version: 1.0.0+1

environment:
  # Match env.FLUTTER_VERSION in .github/workflows/build.yml (3.24.0).
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP client used by ApiClient. `http` is sufficient for the read-only
  # contract; swap for `dio` if you need interceptors / retries.
  http: ^1.2.2

  # Remote image loading + disk caching for slider / news / publication art.
  cached_network_image: ^3.4.1

  # Opening external links: link-target _blank, slider/banner taps, and the
  # `webview` home section + /webview route (which open in the external
  # browser — webview_flutter was removed for CI build portability).
  url_launcher: ^6.3.1

  # Date / number formatting, locale-aware (used by intl-driven widgets).
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # The CI (build.yml → "Inject app_config.json") writes the CMS-generated
  # config to assets/config/app_config.json before `flutter build`. Declaring
  # the directory makes whatever file lands there bundle into the app.
  assets:
    - assets/config/
