name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Download URL untuk ZIP project (dari GitHub Release)'
        required: true
        type: string
      job_id:
        description: 'Job ID untuk tracking'
        required: true
        type: string
      build_type:
        description: 'Build type: apk, aab, atau ios'
        required: false
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - ios

jobs:
  flutter_build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Download project ZIP
        run: |
          echo "📥 Downloading project from: ${{ inputs.zip_url }}"
          mkdir -p project_workspace
          cd project_workspace
          curl -L -o project.zip "${{ inputs.zip_url }}"
          unzip -q project.zip
          ls -la
          cd ..

      - name: Get dependencies
        run: |
          cd project_workspace
          flutter pub get
          cd ..

      - name: Run tests
        continue-on-error: true
        run: |
          cd project_workspace
          flutter test --no-pub
          cd ..

      - name: Build APK
        if: inputs.build_type == 'apk'
        run: |
          cd project_workspace
          flutter build apk --split-per-abi --release
          cd ..

      - name: Build AAB
        if: inputs.build_type == 'aab'
        run: |
          cd project_workspace
          flutter build appbundle --release
          cd ..

      - name: Build iOS
        if: inputs.build_type == 'ios'
        run: |
          cd project_workspace
          flutter build ios --release --no-codesign
          cd ..

      - name: Prepare artifacts
        run: |
          mkdir -p build_output
          
          if [ -d "project_workspace/build/app/outputs/apk/release" ]; then
            cp project_workspace/build/app/outputs/apk/release/*.apk build_output/ || true
          fi
          
          if [ -f "project_workspace/build/app/outputs/bundle/release/app-release.aab" ]; then
            cp project_workspace/build/app/outputs/bundle/release/app-release.aab build_output/ || true
          fi
          
          if [ -d "project_workspace/build/ios/ipa" ]; then
            cd project_workspace/build/ios/ipa
            zip -r ../../../build_output/app-ios.zip . || true
            cd ../../../
          fi
          
          ls -la build_output/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-${{ inputs.job_id }}
          path: build_output/
          retention-days: 3

      - name: Create build summary
        run: |
          echo "## 🎯 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Job ID:** ${{ inputs.job_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
          ls -1 build_output/ | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || echo "- No artifacts generated" >> $GITHUB_STEP_SUMMARY
